name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  quality:
    name: quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Test
        run: go test ./...

  build-macos:
    name: macos ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/pin" .
      - name: Package
        run: |
          set -euo pipefail
          version="${{ github.ref_name }}"
          target="${{ matrix.target }}"
          archive="pin_${version}_${target}.tar.gz"
          tar -C dist -czf "${archive}" pin
          ARCHIVE="${archive}" python3 - <<'PY'
          import hashlib
          import os
          import pathlib

          archive = pathlib.Path(os.environ["ARCHIVE"])
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          out = archive.with_name(archive.name + ".sha256")
          out.write_text(f"{digest}  {archive.name}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            pin_${{ github.ref_name }}_${{ matrix.target }}.tar.gz
            pin_${{ github.ref_name }}_${{ matrix.target }}.tar.gz.sha256

  build-linux:
    name: linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            goos: linux
            goarch: amd64
          - target: aarch64-unknown-linux-musl
            goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o "dist/pin" .
      - name: Package
        run: |
          set -euo pipefail
          version="${{ github.ref_name }}"
          target="${{ matrix.target }}"
          archive="pin_${version}_${target}.tar.gz"
          tar -C dist -czf "${archive}" pin
          ARCHIVE="${archive}" python3 - <<'PY'
          import hashlib
          import os
          import pathlib

          archive = pathlib.Path(os.environ["ARCHIVE"])
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          out = archive.with_name(archive.name + ".sha256")
          out.write_text(f"{digest}  {archive.name}\n")
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            pin_${{ github.ref_name }}_${{ matrix.target }}.tar.gz
            pin_${{ github.ref_name }}_${{ matrix.target }}.tar.gz.sha256

  release:
    name: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-linux
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/**/pin_*.tar.gz*
